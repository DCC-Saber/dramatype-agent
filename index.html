<script type="text/babel">
const {createContext,useContext,useState,useCallback,useEffect,useMemo}=React;
const QuizContext=createContext(null);
const INITIAL_SCORES={linche:0,xuzhixia:0,zhouye:0,guchen:0};
function QuizProvider({children}){
  const[scores,setScores]=useState({...INITIAL_SCORES});
  const[currentQuestion,setCurrentQuestion]=useState(0);
  const[showingFeedback,setShowingFeedback]=useState(false);
  const[selectedAnswer,setSelectedAnswer]=useState(null);
  const[quizCompleted,setQuizCompleted]=useState(false);
  const selectAnswer=useCallback((idx,mapping)=>{setSelectedAnswer(idx);setScores(p=>{const n={...p};mapping.forEach(m=>{n[m.character]=(n[m.character]||0)+m.value});return n});setShowingFeedback(true)},[]);
  const goToNext=useCallback(()=>{if(currentQuestion>=4)setQuizCompleted(true);else setCurrentQuestion(p=>p+1);setShowingFeedback(false);setSelectedAnswer(null)},[currentQuestion]);
  const resetQuiz=useCallback(()=>{setScores({...INITIAL_SCORES});setCurrentQuestion(0);setShowingFeedback(false);setSelectedAnswer(null);setQuizCompleted(false)},[]);
  return <QuizContext.Provider value={{scores,currentQuestion,showingFeedback,selectedAnswer,quizCompleted,selectAnswer,goToNext,resetQuiz}}>{children}</QuizContext.Provider>;
}
function useQuiz(){const c=useContext(QuizContext);if(!c)throw new Error('no context');return c}
</script>

          <div className="mb-5">
            <div className="flex items-center justify-between mb-1.5">
              <span className="text-text-muted text-xs">生成进度</span>
              <span className="text-accent-green text-xs font-mono font-medium">{progress}%</span>
            </div>
            <div className="h-2 bg-white/5 rounded-full overflow-hidden">
              <div className="h-full bg-accent-green rounded-full transition-all duration-500" style={{width:`${progress}%`}}/>
            </div>
          </div>

          {/* Steps */}
          <div className="flex-1 space-y-2.5">
            {AGENT_STEPS.map((s,i)=>{
              const isActive=phase==='generating'&&step===i;
              const isDone=phase==='generating'&&step>i||phase==='done';
              const isIdle=phase==='idle'||(phase==='generating'&&step<i);
              return(<div key={s.id} className={`relative flex items-start gap-3 p-3.5 rounded-xl border transition-all duration-500 ${
                isActive?'border-accent-green/40 bg-accent-green/5':''
              }${isDone?' border-green-800/40 bg-green-900/10':''}${isIdle?' border-white/5 bg-white/[0.01]':''}`}>
                <div className={`w-9 h-9 rounded-lg flex items-center justify-center text-sm shrink-0 transition-all duration-300 ${
                  isActive?'bg-accent-green/20 text-accent-green scale-110':''
                }${isDone?'bg-green-800/30 text-green-400':''}${isIdle?'bg-white/5 text-text-muted':''}`}>
                  {isDone?<svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M5 13l4 4L19 7"/></svg>:<span>{s.icon}</span>}
                </div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2">
                    <span className={`text-xs font-medium ${isActive?'text-accent-green':''}${isDone?'text-green-400':''}${isIdle?'text-text-muted':''}`}>{s.id}. {s.label}</span>
                    {isActive&&<span className="text-accent-green text-[10px] animate-pulse">处理中...</span>}
                  </div>
                  {(isActive||isDone)&&<p className="text-text-secondary text-[11px] mt-1 leading-relaxed anim-fade-in">{s.desc}</p>}
                </div>
              </div>);
            })}
          </div>

          {/* Action button */}
          <div className="mt-5 pt-4 border-t border-white/5">
            {phase==='idle'&&<button onClick={startGenerate} className="w-full py-3.5 bg-accent-green text-bg-primary font-bold rounded-xl hover:bg-accent-green-hover transition-all duration-300 pulse-glow">开始生成</button>}
            {phase==='generating'&&<button disabled className="w-full py-3.5 bg-accent-green/30 text-bg-primary font-bold rounded-xl cursor-wait flex items-center justify-center gap-2"><span className="w-4 h-4 border-2 border-bg-primary/30 border-t-bg-primary rounded-full animate-spin"/>生成中...</button>}
            {phase==='done'&&<button onClick={()=>onNavigate('select')} className="w-full py-3.5 bg-accent-green text-bg-primary font-bold rounded-xl hover:bg-accent-green-hover transition-all duration-300 pulse-glow">生成完成，进入用户端预览 →</button>}
          </div>
        </div>

        {/* Right: Results */}
        <div className="w-[30%] border-l border-white/5 overflow-y-auto p-5">
          <h3 className="text-sm font-medium text-text-primary mb-1">生成结果</h3>
          <p className="text-text-muted text-xs mb-4">{phase==='done'?'生成完成，可进入用户端预览':'等待 AI 生成...'}</p>

          {/* Result cards */}
          <div className={`space-y-2 mb-6 transition-opacity duration-500 ${phase==='done'?'opacity-100':'opacity-30'}`}>
            {AGENT_RESULTS.map((r,i)=>(
              <div key={i} className="flex items-center justify-between p-3 rounded-xl bg-white/[0.02] border border-white/5">
                <span className="text-text-secondary text-xs">{r.label}</span>
                <span className="text-xs font-medium font-mono" style={{color:r.color}}>{r.value}</span>
              </div>
            ))}
          </div>

          {/* Preview section */}
          <div className={`transition-opacity duration-500 ${phase==='done'?'opacity-100':'opacity-20'}`}>
            <h4 className="text-xs font-medium text-text-primary mb-3">生成预览 — 剧情节点示例</h4>
            <div className="bg-bg-card border border-white/10 rounded-xl p-4 space-y-3">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-base">✉️</span>
                <span className="text-text-primary text-sm font-medium">被藏起的来信</span>
              </div>
              <div><p className="text-text-muted text-[10px] mb-1">生成题目</p><p className="text-text-secondary text-xs leading-relaxed">你发现朋友偷偷藏起了一封关键来信，你会怎么做？</p></div>
              <div className="h-px bg-white/5"/>
              <div><p className="text-text-muted text-[10px] mb-2">选项映射</p>
                <div className="space-y-1.5">
                  {[[{opt:'当场质问',char:'周野',logic:'直接破局',color:'#f87171'}],[{opt:'暗中调查',char:'林澈',logic:'延迟观察',color:'#60a5fa'}],[{opt:'替他隐瞒',char:'许知夏',logic:'关系保护',color:'#fbbf24'}],[{opt:'交给他人',char:'顾沉',logic:'规则处理',color:'#a78bfa'}]].map(([{opt,char,logic,color}],i)=>(
                    <div key={i} className="flex items-center gap-2 text-[11px]">
                      <span className="text-text-muted font-mono w-3">{String.fromCharCode(65+i)}.</span>
                      <span className="text-text-secondary">{opt}</span>
                      <svg className="w-3 h-3 text-text-muted shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                      <span style={{color}} className="font-medium">{char}</span>
                      <span className="text-text-muted">/ {logic}</span>
                    </div>
                  ))}
                </div>
              </div>
              <div className="h-px bg-white/5"/>
              <div><p className="text-text-muted text-[10px] mb-1">切片候选</p><p className="text-accent-green text-xs">第 2 集 13:42｜没有拆穿的来信</p></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>);
}
</script>

<!-- ==================== APP ==================== -->
<script type="text/babel">
function App(){
  const[page,setPage]=useState('home');
  const[trans,setTrans]=useState(false);
  const nav=useCallback(t=>{setTrans(true);setTimeout(()=>{setPage(t);window.location.hash=t==='home'?'':t;window.scrollTo(0,0);setTrans(false)},200)},[]);
  useEffect(()=>{const h=()=>{const v=window.location.hash.slice(1);if(v&&['home','select','quiz','results','share','agent'].includes(v))setPage(v)};window.addEventListener('hashchange',h);h();return()=>window.removeEventListener('hashchange',h)},[]);
  const pg={home:Home,select:DramaSelect,quiz:Quiz,results:Results,share:ShareCard,agent:AgentConsole};
  const Page=pg[page]||Home;
  return <div style={{opacity:trans?0:1,transition:'opacity .2s ease'}}><Page onNavigate={nav}/></div>;
}
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<QuizProvider><App/></QuizProvider>);
</script>
</body>
</html>
