<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>剧格 AI DramaType — 腾讯视频剧情人格互动测试</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: { primary:'#0a0a0f', secondary:'#111118', card:'#1a1a24', elevated:'#22222e' },
            accent: { green:'#2bcb79', 'green-hover':'#34d984' },
            character: { linche:'#60a5fa', xuzhixia:'#fbbf24', zhouye:'#f87171', guchen:'#a78bfa' },
            text: { primary:'#f0f0f5', secondary:'#9ca3af', muted:'#6b7280' },
            agent: { accent:'#6366f1', green:'#22c55e', red:'#ef4444', yellow:'#eab308', cyan:'#06b6d4' },
          },
          fontFamily: {
            display: ['"Noto Serif SC"','STSong','SimSun','serif'],
            body: ['"Noto Sans SC"','"Microsoft YaHei"','system-ui','sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh;background:#0a0a0f;color:#f0f0f5}
    #root{min-height:100vh}
    ::selection{background:rgba(43,203,121,.3);color:#fff}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:#0a0a0f}
    ::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
    .film-grain::before{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");background-repeat:repeat;pointer-events:none;z-index:1;opacity:.5}
    .scanlines::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);pointer-events:none;z-index:2}
    .text-shadow-glow{text-shadow:0 0 20px rgba(43,203,121,.5),0 0 40px rgba(43,203,121,.2)}
    .text-shadow-title{text-shadow:0 2px 20px rgba(0,0,0,.8),0 0 60px rgba(43,203,121,.15)}
    @keyframes spectrumFill{from{width:0%}}
    .spectrum-bar{animation:spectrumFill 1.2s ease-out forwards}
    @keyframes progressPulse{0%,100%{opacity:1}50%{opacity:.6}}
    .progress-pulse{animation:progressPulse 2s ease-in-out infinite}
    @keyframes pulseGlow{0%,100%{box-shadow:0 0 20px rgba(43,203,121,.2)}50%{box-shadow:0 0 40px rgba(43,203,121,.4)}}
    .pulse-glow{animation:pulseGlow 2s ease-in-out infinite}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideInLeft{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
    @keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
    .anim-fade-in{animation:fadeIn .6s ease-out both}
    .anim-slide-up{animation:slideUp .6s ease-out both}
    .anim-slide-left{animation:slideInLeft .5s ease-out both}
    .anim-slide-right{animation:slideInRight .5s ease-out both}
    .d100{animation-delay:.1s}.d200{animation-delay:.2s}.d300{animation-delay:.3s}.d400{animation-delay:.4s}
    .d500{animation-delay:.5s}.d600{animation-delay:.6s}.d700{animation-delay:.7s}.d800{animation-delay:.8s}
    .d1000{animation-delay:1s}.d1200{animation-delay:1.2s}.d1400{animation-delay:1.4s}.d1600{animation-delay:1.6s}
    .option-card{transition:all .3s ease}
    .option-card:hover{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.06);transform:translateX(4px)}
    .option-card.selected{border-color:rgba(43,203,121,.6);background:rgba(43,203,121,.1);transform:scale(1.02)}
    .option-card:active{transform:scale(.98)}
    .modal-backdrop{backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}

    /* ── Agent Header Bar ─────────────────────────────── */
    .agent-header-bar{
      position:sticky;top:0;z-index:100;
      background:rgba(10,10,15,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,.06);
      display:flex;align-items:center;gap:12px;padding:10px 20px;
    }
    .agent-header-bar .brand{flex:1;display:flex;align-items:center;gap:10px}
    .agent-header-bar .brand-title{font-family:"Noto Serif SC",serif;font-size:15px;font-weight:700;color:#f0f0f5}
    .agent-header-bar .brand-title em{color:#2bcb79;font-style:normal}
    .agent-header-bar .brand-sub{font-size:11px;color:#6b7280;margin-left:4px}

    /* ── Agent Buttons ────────────────────────────────── */
    .ag-btn{
      padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;
      border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);
      color:#9ca3af;cursor:pointer;transition:all .2s;white-space:nowrap;
      display:flex;align-items:center;gap:5px;
    }
    .ag-btn:hover{background:rgba(255,255,255,.08);color:#f0f0f5;border-color:rgba(255,255,255,.18)}
    .ag-btn.primary{background:rgba(43,203,121,.15);border-color:rgba(43,203,121,.3);color:#2bcb79}
    .ag-btn.primary:hover{background:rgba(43,203,121,.25)}
    .ag-btn.primary:disabled{opacity:.4;cursor:not-allowed}
    .ag-btn.accent{background:rgba(99,102,241,.12);border-color:rgba(99,102,241,.25);color:#818cf8}
    .ag-btn.accent:hover{background:rgba(99,102,241,.2)}

    /* ── Provider Badge ───────────────────────────────── */
    .prov-badge{
      display:inline-flex;align-items:center;gap:6px;
      padding:3px 10px;border-radius:5px;font-size:11px;font-weight:600;
      background:rgba(99,102,241,.1);color:#818cf8;border:1px solid rgba(99,102,241,.2);
    }
    .prov-badge.ok{background:rgba(34,197,94,.1);color:#22c55e;border-color:rgba(34,197,94,.2)}
    .prov-badge.warn{background:rgba(234,179,8,.1);color:#eab308;border-color:rgba(234,179,8,.2)}
    .prov-badge.err{background:rgba(239,68,68,.1);color:#ef4444;border-color:rgba(239,68,68,.2)}
    .prov-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

    /* ── Mode Toggle ──────────────────────────────────── */
    .mode-toggle{
      display:flex;border-radius:8px;overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
    }
    .mode-toggle button{
      padding:6px 12px;font-size:11px;font-weight:600;
      background:transparent;color:#6b7280;border:none;cursor:pointer;transition:all .2s;
    }
    .mode-toggle button.active{background:rgba(43,203,121,.15);color:#2bcb79}
    .mode-toggle button:not(.active):hover{color:#9ca3af}

    /* ── Agent Drawer ─────────────────────────────────── */
    .agent-drawer-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
      opacity:0;pointer-events:none;transition:opacity .3s;
    }
    .agent-drawer-overlay.open{opacity:1;pointer-events:auto}
    .agent-drawer{
      position:fixed;top:0;right:0;bottom:0;width:400px;max-width:90vw;
      background:#111118;border-left:1px solid rgba(255,255,255,.08);
      z-index:201;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
      display:flex;flex-direction:column;overflow:hidden;
    }
    .agent-drawer.open{transform:translateX(0)}
    .drawer-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;
    }
    .drawer-header h3{font-size:14px;font-weight:700;color:#f0f0f5;display:flex;align-items:center;gap:8px}
    .drawer-close{
      width:28px;height:28px;border-radius:6px;border:1px solid rgba(255,255,255,.08);
      background:transparent;color:#6b7280;cursor:pointer;display:flex;align-items:center;justify-content:center;
      font-size:14px;transition:all .15s;
    }
    .drawer-close:hover{background:rgba(255,255,255,.05);color:#f0f0f5}
    .drawer-body{flex:1;overflow-y:auto;padding:16px 20px}

    /* ── Drawer Sections ──────────────────────────────── */
    .drawer-section{margin-bottom:20px}
    .drawer-section h4{
      font-size:10px;text-transform:uppercase;letter-spacing:.8px;
      color:#6b7280;margin-bottom:10px;padding-bottom:6px;
      border-bottom:1px solid rgba(255,255,255,.04);
    }
    .drawer-metric{
      display:flex;justify-content:space-between;align-items:center;
      padding:5px 0;font-size:12px;
    }
    .drawer-metric .label{color:#9ca3af}
    .drawer-metric .val{font-weight:600;color:#f0f0f5}
    .drawer-metric .val.good{color:#22c55e}
    .drawer-metric .val.bad{color:#ef4444}
    .drawer-metric .val.warn{color:#eab308}

    /* ── Timeline ─────────────────────────────────────── */
    .tl-step{
      display:flex;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.03);
    }
    .tl-dot{
      width:24px;height:24px;border-radius:50%;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      font-size:10px;font-weight:700;margin-top:2px;
      background:rgba(255,255,255,.05);color:#6b7280;
    }
    .tl-step.done .tl-dot{background:rgba(34,197,94,.15);color:#22c55e}
    .tl-step.fail .tl-dot{background:rgba(239,68,68,.15);color:#ef4444}
    .tl-content{flex:1;min-width:0}
    .tl-tool{
      display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;
      font-weight:700;text-transform:uppercase;margin-left:6px;
    }
    .tl-tool.knowledge{background:rgba(6,182,212,.12);color:#06b6d4}
    .tl-tool.llm{background:rgba(99,102,241,.12);color:#818cf8}
    .tl-tool.rag{background:rgba(34,197,94,.12);color:#22c55e}
    .tl-tool.repair{background:rgba(234,179,8,.12);color:#eab308}
    .tl-tool.schema{background:rgba(168,85,247,.12);color:#a855f7}
    .tl-tool.safety{background:rgba(239,68,68,.12);color:#ef4444}
    .tl-tool.save{background:rgba(34,197,94,.12);color:#22c55e}
    .tl-tool.report{background:rgba(99,102,241,.12);color:#818cf8}
    .tl-summary{font-size:11px;color:#9ca3af;line-height:1.5;margin-top:3px}
    .tl-error{font-size:10px;color:#ef4444;margin-top:2px;font-family:'SF Mono',monospace}

    /* ── Fallback Banner ──────────────────────────────── */
    .fallback-banner{
      background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.2);
      border-radius:8px;padding:10px 14px;margin-bottom:14px;
      font-size:11px;color:#eab308;line-height:1.6;
    }
    .fallback-banner strong{display:block;margin-bottom:3px;font-size:12px}

    /* ── Evidence Cards ───────────────────────────────── */
    .ev-card{
      background:rgba(255,255,255,.02);border-left:3px solid #0891b2;
      border-radius:0 6px 6px 0;padding:8px 10px;margin-bottom:6px;
    }
    .ev-card .src{font-size:10px;font-weight:600;color:#06b6d4}
    .ev-card .sec{font-size:10px;color:#6b7280;margin:1px 0}
    .ev-card .quote{
      font-size:10px;color:#f0f0f5;line-height:1.5;margin-top:3px;
      background:rgba(255,255,255,.03);padding:4px 6px;border-radius:3px;
      font-family:'SF Mono',monospace;
    }

    /* ── Spinner ──────────────────────────────────────── */
    .ag-spinner{
      display:inline-block;width:14px;height:14px;
      border:2px solid rgba(255,255,255,.1);border-top-color:#2bcb79;
      border-radius:50%;animation:spin .6s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Toast ────────────────────────────────────────── */
    .ag-toast{
      position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
      background:#22222e;border:1px solid rgba(255,255,255,.1);
      padding:10px 20px;border-radius:8px;font-size:13px;
      z-index:999;animation:toastIn .3s ease;
      box-shadow:0 8px 24px rgba(0,0,0,.5);
    }
    .ag-toast.error{border-color:rgba(239,68,68,.3);color:#ef4444}
    .ag-toast.success{border-color:rgba(34,197,94,.3);color:#22c55e}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

    /* ── Agent-aware indicator ────────────────────────── */
    .agent-origin-tag{
      display:inline-flex;align-items:center;gap:4px;
      padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;
      background:rgba(99,102,241,.1);color:#818cf8;border:1px solid rgba(99,102,241,.2);
    }
  </style>
</head>

<script type="text/babel">
const {createContext,useContext,useState,useCallback,useEffect,useMemo,useRef}=React;
const QuizContext=createContext(null);
const INITIAL_SCORES={linche:0,xuzhixia:0,zhouye:0,guchen:0};
function QuizProvider({children}){
  const[scores,setScores]=useState({...INITIAL_SCORES});
  const[currentQuestion,setCurrentQuestion]=useState(0);
  const[showingFeedback,setShowingFeedback]=useState(false);
  const[selectedAnswer,setSelectedAnswer]=useState(null);
  const[quizCompleted,setQuizCompleted]=useState(false);
  const selectAnswer=useCallback((idx,mapping)=>{setSelectedAnswer(idx);setScores(p=>{const n={...p};mapping.forEach(m=>{n[m.character]=(n[m.character]||0)+m.value});return n});setShowingFeedback(true)},[]);
  const goToNext=useCallback(()=>{if(currentQuestion>=((window.__agentQs||questions).length-1))setQuizCompleted(true);else setCurrentQuestion(p=>p+1);setShowingFeedback(false);setSelectedAnswer(null)},[currentQuestion]);
  const resetQuiz=useCallback(()=>{setScores({...INITIAL_SCORES});setCurrentQuestion(0);setShowingFeedback(false);setSelectedAnswer(null);setQuizCompleted(false)},[]);
  return <QuizContext.Provider value={{scores,currentQuestion,showingFeedback,selectedAnswer,quizCompleted,selectAnswer,goToNext,resetQuiz}}>{children}</QuizContext.Provider>;
}
function useQuiz(){const c=useContext(QuizContext);if(!c)throw new Error('no context');return c}
</script>

          <button onClick={()=>onNavigate('results')} className="px-8 py-3 bg-white/5 border border-white/10 text-text-primary font-medium rounded-xl hover:bg-white/10 transition-all duration-300">返回结果</button>
        </div>
      </div>
    </div>
  </div>);
}
</script>

<!-- ==================== AGENT DRAWER ==================== -->
<script type="text/babel">
function toolTagClass(tool){
  if(!tool)return '';
  if(tool.includes('knowledge'))return 'knowledge';
  if(tool.includes('llm'))return 'llm';
  if(tool.includes('rag'))return 'rag';
  if(tool.includes('repair'))return 'repair';
  if(tool.includes('validate'))return 'schema';
  if(tool.includes('safety'))return 'safety';
  if(tool.includes('save'))return 'save';
  if(tool.includes('report'))return 'report';
  return '';
}
function toolLabel(tool){
  const m={knowledge_stats:'Knowledge',rebuild_knowledge_index:'Knowledge',generate_content_pack_llm:'LLM',generate_content_pack_rag:'RAG',generate_content_pack_rule_based:'Rule',repair_content_pack:'Repair',validate_content_pack:'Schema',review_safety:'Safety',save_content_pack:'Save',generate_review_report:'Report',search_knowledge:'Search'};
  return m[tool]||(tool||'').replace(/_/g,' ');
}

function AgentDrawer({open,onClose,agentResult,providerStatus,currentQIndex,testingLLM,onTestLLM}){
  const rr=agentResult?agentResult.review_report:null;
  const steps=agentResult?agentResult.steps||[]:[];
  const cp=agentResult?agentResult.final_content_pack:null;
  const evRefs=cp&&cp.questions&&cp.questions[currentQIndex]?cp.questions[currentQIndex].evidence_refs||[]:[];
  const agentMeta=cp?cp.agent_meta||{}:{};

  // Determine generation status banner
  let statusBanner=null;
  if(rr){
    if(rr.llm_attempted&&rr.fallback_used){
      statusBanner={type:'warn',text:`LLM 尝试 (${rr.llm_provider_attempted||'?'}) 后 Fallback → ${rr.final_generation_mode||'rag'}`,detail:rr.fallback_reason||''};
    }else if(rr.final_generation_mode==='llm'){
      statusBanner={type:'ok',text:`LLM 生成成功 (${rr.llm_provider_attempted||agentMeta.llm_provider||'?'})`,detail:''};
    }else if(rr.final_generation_mode==='rag'){
      statusBanner={type:'info',text:`RAG 模式生成完成`,detail:''};
    }else if(rr.final_generation_mode==='rule_based'){
      statusBanner={type:'info',text:`Rule-based 模式生成完成`,detail:''};
    }
  }

  return(<>
    <div className={`agent-drawer-overlay ${open?'open':''}`} onClick={onClose}/>
    <div className={`agent-drawer ${open?'open':''}`}>
      <div className="drawer-header">
        <h3><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>Agent Console</h3>
        <button className="drawer-close" onClick={onClose}>✕</button>
      </div>
      <div className="drawer-body">
        {/* Provider Status */}
        <div className="drawer-section">
          <h4>Provider 状态</h4>
          {providerStatus?(
            <div>
              <div className="drawer-metric"><span className="label">Provider</span><span className={`prov-badge ${providerStatus.has_api_key?'ok':'warn'}`}><span className="prov-dot"/>{providerStatus.provider}</span></div>
              <div className="drawer-metric"><span className="label">Model</span><span className="val">{providerStatus.model||'-'}</span></div>
              <div className="drawer-metric"><span className="label">Base URL</span><span className="val" style={{fontSize:10}}>{providerStatus.base_url||'-'}</span></div>
              <div className="drawer-metric"><span className="label">API Key</span><span className={`val ${providerStatus.has_api_key?'good':'warn'}`}>{providerStatus.has_api_key?'已配置':'未配置'}</span></div>
              <div className="drawer-metric"><span className="label">Key 来源</span><span className="val" style={{fontSize:10}}>{providerStatus.api_key_source||'-'}</span></div>
              {providerStatus.warnings&&providerStatus.warnings.length>0&&providerStatus.warnings.map((w,i)=><div key={i} style={{fontSize:10,color:'#eab308',marginTop:2}}>⚠ {w}</div>)}
              <div style={{marginTop:8}}>
                <button className={`ag-btn ${testingLLM?'':'accent'}`} onClick={onTestLLM} disabled={testingLLM} style={{width:'100%',justifyContent:'center'}}>
                  {testingLLM?<><span className="ag-spinner"/> Testing...</>:'Test LLM'}
                </button>
              </div>
            </div>
          ):(
            <p style={{fontSize:11,color:'#6b7280'}}>点击 <strong>Check LLM</strong> 查看状态</p>
          )}
        </div>

        {/* Generation Status Banner */}
        {statusBanner&&<div style={{
          padding:'10px 14px',borderRadius:8,marginBottom:14,fontSize:12,lineHeight:1.6,
          background:statusBanner.type==='ok'?'rgba(34,197,94,.08)':statusBanner.type==='warn'?'rgba(234,179,8,.08)':'rgba(255,255,255,.04)',
          border:`1px solid ${statusBanner.type==='ok'?'rgba(34,197,94,.2)':statusBanner.type==='warn'?'rgba(234,179,8,.2)':'rgba(255,255,255,.08)'}`,
          color:statusBanner.type==='ok'?'#22c55e':statusBanner.type==='warn'?'#eab308':'#9ca3af',
        }}>
          <strong style={{display:'block',marginBottom:2}}>{statusBanner.text}</strong>
          {statusBanner.detail&&<span style={{fontSize:11}}>{statusBanner.detail}</span>}
        </div>}

        {/* LLM Tracking */}
        {rr&&rr.llm_attempted&&<div className="drawer-section">
          <h4>LLM 调用追踪</h4>
          <div className="drawer-metric"><span className="label">llm_attempted</span><span className="val good">true</span></div>
          <div className="drawer-metric"><span className="label">llm_provider_attempted</span><span className="val">{rr.llm_provider_attempted||agentMeta.llm_provider_attempted||'-'}</span></div>
          <div className="drawer-metric"><span className="label">llm_model_attempted</span><span className="val">{rr.llm_model_attempted||agentMeta.llm_model_attempted||'-'}</span></div>
          <div className="drawer-metric"><span className="label">llm_call_status</span><span className={`val ${rr.llm_call_status==='completed'?'good':'bad'}`}>{rr.llm_call_status||'-'}</span></div>
          <div className="drawer-metric"><span className="label">fallback_used</span><span className={`val ${rr.fallback_used?'warn':'good'}`}>{rr.fallback_used?'true':'false'}</span></div>
          {rr.fallback_reason&&<div className="fallback-banner" style={{marginTop:6}}><strong>fallback_reason</strong>{rr.fallback_reason}</div>}
          <div className="drawer-metric"><span className="label">final_generation_mode</span><span className={`val ${rr.final_generation_mode==='llm'?'good':'warn'}`}>{rr.final_generation_mode||'-'}</span></div>
        </div>}

        {/* Review Report */}
        {rr&&<div className="drawer-section">
          <h4>Review Report</h4>
          <div className="drawer-metric"><span className="label">evidence_coverage</span><span className={`val ${(rr.evidence_coverage||0)>=1?'good':'bad'}`}>{((rr.evidence_coverage||0)*100).toFixed(0)}%</span></div>
          <div className="drawer-metric"><span className="label">total_evidence_refs</span><span className="val">{rr.total_evidence_refs||0}</span></div>
          <div className="drawer-metric"><span className="label">questions_with_evidence</span><span className="val">{rr.questions_with_evidence||0}</span></div>
          <div className="drawer-metric"><span className="label">nodes_with_evidence</span><span className="val">{rr.nodes_with_evidence||0}</span></div>
          <div className="drawer-metric"><span className="label">schema_validation_passed</span><span className={`val ${rr.schema_validation_passed?'good':'bad'}`}>{rr.schema_validation_passed?'true':'false'}</span></div>
          <div className="drawer-metric"><span className="label">needs_human_review</span><span className={`val ${rr.needs_human_review?'warn':'good'}`}>{rr.needs_human_review?'true':'false'}</span></div>
          <div className="drawer-metric"><span className="label">safety_risk_flags</span><span className={`val ${(rr.safety_risk_flags||[]).length?'bad':'good'}`}>{(rr.safety_risk_flags||[]).length}</span></div>
          <div className="drawer-metric"><span className="label">safety_spoiler_flags</span><span className={`val ${(rr.safety_spoiler_flags||[]).length?'bad':'good'}`}>{(rr.safety_spoiler_flags||[]).length}</span></div>
          {(rr.safety_risk_flags||[]).length>0&&<div style={{fontSize:10,color:'#ef4444',marginTop:4}}>{rr.safety_risk_flags.map((f,i)=><div key={i}>• {typeof f==='string'?f:JSON.stringify(f)}</div>)}</div>}
          {rr.recommended_next_action&&<div style={{marginTop:8,padding:'6px 10px',background:'rgba(255,255,255,.03)',borderRadius:6,fontSize:11,color:'#9ca3af',lineHeight:1.5}}><span style={{color:'#6b7280',fontSize:10}}>recommended_next_action:</span><br/>{rr.recommended_next_action}</div>}
          {rr.generation_mode&&<div className="drawer-metric"><span className="label">generation_mode</span><span className="val">{rr.generation_mode}</span></div>}
          {rr.llm_provider!==undefined&&<div className="drawer-metric"><span className="label">llm_provider</span><span className="val">{rr.llm_provider||'null'}</span></div>}
        </div>}

        {/* Steps Timeline */}
        {steps.length>0&&<div className="drawer-section">
          <h4>Agent Steps Timeline ({steps.length} steps)</h4>
          {steps.map((step,i)=>{
            const tc=step.tool_call||{};
            const obs=step.observation||{};
            const isDone=step.status==='completed';
            const isFail=step.status==='failed';
            // Format observation summary
            let obsSummary='';
            if(obs.error){
              obsSummary=String(obs.error).substring(0,150);
            }else if(obs.data&&typeof obs.data==='object'){
              const keys=Object.keys(obs.data).slice(0,4);
              obsSummary=keys.map(k=>{const v=obs.data[k];return `${k}: ${typeof v==='object'?(Array.isArray(v)?`[${v.length}]`:'{...}'):String(v).substring(0,40)}`}).join(' | ');
            }else if(typeof obs==='string'){
              obsSummary=obs.substring(0,100);
            }
            return(<div key={i} className={`tl-step ${isDone?'done':''} ${isFail?'fail':''}`}>
              <div className="tl-dot">{isDone?'✓':isFail?'✗':step.step_index||i+1}</div>
              <div className="tl-content">
                <div style={{fontSize:11,fontWeight:600,color:isFail?'#ef4444':'#f0f0f5'}}>
                  {step.decision_summary||tc.tool_name||'Step'}
                  <span className={`tl-tool ${toolTagClass(tc.tool_name||'')}`}>{toolLabel(tc.tool_name||'')}</span>
                </div>
                {step.phase&&<div style={{fontSize:9,color:'#6b7280',marginTop:1}}>phase: {step.phase}</div>}
                {obsSummary&&<div className={isFail?'tl-error':'tl-summary'}>{obsSummary}</div>}
              </div>
            </div>);
          })}
        </div>}

        {/* Evidence for current question */}
        {evRefs.length>0&&<div className="drawer-section">
          <h4>Evidence Refs (Q{(currentQIndex||0)+1})</h4>
          {evRefs.map((ref,i)=>(<div key={i} className="ev-card">
            <div className="src">{ref.source_file||'?'} <span style={{color:'#6b7280',fontWeight:400}}>[{ref.doc_type||''}]</span></div>
            <div className="sec">{ref.section||''}</div>
            <div className="quote">{(ref.quote||'').substring(0,200)}</div>
            {ref.relevance&&<div style={{fontSize:9,color:'#6b7280',marginTop:2}}>relevance: {ref.relevance}</div>}
          </div>))}
        </div>}

        {/* Errors */}
        {agentResult&&agentResult.errors&&agentResult.errors.length>0&&<div className="drawer-section">
          <h4 style={{color:'#ef4444'}}>Errors</h4>
          {agentResult.errors.map((e,i)=><div key={i} style={{fontSize:11,color:'#ef4444',marginBottom:4,padding:'4px 8px',background:'rgba(239,68,68,.05)',borderRadius:4}}>{String(e)}</div>)}
        </div>}

        {/* Empty state */}
        {!agentResult&&<div style={{textAlign:'center',padding:'30px 0',color:'#6b7280',fontSize:12}}>
          <div style={{fontSize:32,opacity:.3,marginBottom:8}}>⚙</div>
          <p>点击 <strong>Run Agent</strong> 运行 Agent</p>
          <p style={{marginTop:4,fontSize:11}}>Agent 执行步骤将在此实时显示</p>
        </div>}
      </div>
    </div>
  </>);
}
</script>

<!-- ==================== APP ==================== -->
<script type="text/babel">
function App(){
  const[page,setPage]=useState('home');
  const[trans,setTrans]=useState(false);
  const[drawerOpen,setDrawerOpen]=useState(false);
  const[mode,setMode]=useState('experience');
  const[providerStatus,setProviderStatus]=useState(null);
  const[agentResult,setAgentResult]=useState(null);
  const[running,setRunning]=useState(false);
  const[testingLLM,setTestingLLM]=useState(false);
  const[toastMsg,setToastMsg]=useState(null);
  const[goalText,setGoalText]=useState('请基于《雾港来信》知识库生成一个有中文平台运营感、可审核、可追溯、无剧透的互动内容包。每道题必须有素材依据，适合运营人工审核。');
  const[showGoal,setShowGoal]=useState(false);

  const nav=useCallback(t=>{setTrans(true);setTimeout(()=>{setPage(t);window.location.hash=t==='home'?'':t;window.scrollTo(0,0);setTrans(false)},200)},[]);

  useEffect(()=>{const h=()=>{const v=window.location.hash.slice(1);if(v&&['home','select','quiz','results','share'].includes(v))setPage(v)};window.addEventListener('hashchange',h);h();return()=>window.removeEventListener('hashchange',h)},[]);

  // Auto-check LLM on load
  useEffect(()=>{checkLLM()},[]);

  const toastTimer=useRef(null);
  const toast=useCallback((msg,type='')=>{
    setToastMsg({msg,type});
    if(toastTimer.current)clearTimeout(toastTimer.current);
    toastTimer.current=setTimeout(()=>setToastMsg(null),4000);
  },[]);

  // Check LLM — GET /api/llm/status
  const checkLLM=useCallback(async()=>{
    try{
      const res=await fetch(`${API}/api/llm/status`);
      if(!res.ok)throw new Error(`HTTP ${res.status}`);
      const data=await res.json();
      setProviderStatus(data);
      if(data.has_api_key)toast(`${data.provider} / ${data.model} ready`,'success');
      else toast('LLM key 未配置，Agent 可能 fallback 到 RAG','');
    }catch(e){
      setProviderStatus({provider:'offline',has_api_key:false,model:''});
      toast('Backend is not running. Start: uvicorn app.main:app --reload','error');
    }
  },[]);

  // Test LLM — POST /api/llm/test
  const testLLM=useCallback(async()=>{
    setTestingLLM(true);
    try{
      const res=await fetch(`${API}/api/llm/test`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({message:'只回复 OK'}),
      });
      if(!res.ok)throw new Error(`HTTP ${res.status}`);
      const data=await res.json();
      if(data.success){
        toast(`LLM test OK (${data.latency_ms}ms) — ${data.response_preview}`,'success');
      }else{
        toast(`LLM test failed: ${data.error_type} — ${data.error_message}`,'error');
      }
    }catch(e){
      toast(`LLM test failed: ${e.message}`,'error');
    }finally{
      setTestingLLM(false);
    }
  },[]);

  // Run Agent — POST /api/agent/run
  const runAgent=useCallback(async()=>{
    setRunning(true);
    setAgentResult(null);
    try{
      const res=await fetch(`${API}/api/agent/run`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          goal:goalText,
          series_id:'wugang_letters',
          preferred_mode:'llm',
          max_steps:12,
          require_evidence:true,
          require_human_review:true,
        }),
      });
      if(!res.ok)throw new Error(`HTTP ${res.status}`);
      const data=await res.json();
      setAgentResult(data);

      // Convert content_pack to game data
      if(data.final_content_pack){
        const cp=data.final_content_pack;
        // Characters
        if(cp.characters&&cp.characters.length){
          const charColors=['#60a5fa','#fbbf24','#f87171','#a78bfa','#34d984','#f472b6'];
          const charMap={};
          cp.characters.forEach((c,i)=>{
            charMap[c.id]={key:c.id,name:c.name||c.id,title:c.title||'',color:charColors[i%charColors.length],keywords:c.keywords||[],desc:c.description||''};
          });
          window.__agentChars=charMap;
        }
        // Questions
        if(cp.questions&&cp.questions.length){
          const gradients=['from-slate-900 via-blue-950 to-slate-800','from-zinc-900 via-red-950 to-zinc-900','from-slate-900 via-amber-950 to-slate-800','from-zinc-900 via-purple-950 to-zinc-900','from-slate-900 via-slate-800 to-zinc-900'];
          const emojis=['✉️','🔪','⏰','⚖️','🌊'];
          const qs=cp.questions.map((q,i)=>{
            const charKeys=Object.keys(window.__agentChars||characters);
            return{
              id:i+1,title:q.title||`第${i+1}题`,episode:q.episode||`第${i+1}集`,
              background:q.background||'',question:q.question||'',
              sceneGradient:gradients[i%gradients.length],sceneEmoji:emojis[i%emojis.length],
              sceneDesc:q.background||'',
              options:(q.options||[]).map((opt,oi)=>{
                // Try to match character from option
                const matchedChar=opt.character_id||charKeys[oi%charKeys.length]||charKeys[0];
                return{
                  text:opt.text||'',
                  mapping:charKeys.length>=2?[{character:charKeys[0],value:i%2===0?3:1},{character:charKeys[1],value:i%2===0?1:3}]:[],
                  feedbackCharacter:matchedChar,
                  slice:{
                    title:`${q.episode||''} ${q.title||''} | ${opt.text||''}`,
                    time:opt.timestamp||'00:00',
                    scene:opt.scene_description||'',
                    subtitle:opt.feedback_character||opt.text||'',
                    analysis:opt.analysis||'',
                  },
                };
              }),
            };
          });
          window.__agentQs=qs;
        }
        // Results
        if(cp.results&&cp.results.length){
          const rMap={};
          cp.results.forEach(r=>{
            rMap[r.character_id]={
              name:r.title||r.character_id,title:r.title||'',
              mainQuote:r.main_quote||'',explanation:r.explanation||'',
              fateHint:r.fate_hint||'',
              recommendedScenes:(r.recommended_scenes||[]).map(s=>typeof s==='string'?s:s.title||JSON.stringify(s)),
            };
          });
          window.__agentResults=rMap;
        }
        // Drama
        if(cp.drama){
          window.__agentDrama={
            title:cp.drama.title||dramaInfo.title,
            type:cp.drama.genre||cp.drama.type||dramaInfo.type,
            description:cp.drama.description||dramaInfo.description,
          };
        }
        // Meta
        window.__agentMeta={
          llm_attempted:!!((data.review_report||{}).llm_attempted),
          llm_provider:((data.review_report||{}).llm_provider_attempted)||null,
          final_generation_mode:((data.review_report||{}).final_generation_mode)||null,
          evidence_coverage:((data.review_report||{}).evidence_coverage)||0,
        };

        // Success/fallback messaging
        const rr=data.review_report||{};
        if(rr.llm_attempted&&rr.fallback_used){
          toast(`Agent 完成: LLM ${rr.llm_provider_attempted||''} → fallback to ${rr.final_generation_mode}`,'');
        }else if(rr.final_generation_mode==='llm'){
          toast('Agent 完成: LLM 生成成功！','success');
        }else{
          toast('Agent 完成，内容已更新！','success');
        }
      }else{
        toast('Agent 完成，但未生成内容包','');
      }
    }catch(e){
      toast(`Agent 执行失败: ${e.message}`,'error');
    }finally{
      setRunning(false);
    }
  },[goalText]);

  const toggleMode=useCallback(m=>{
    setMode(m);
    if(m==='agent')setDrawerOpen(true);
  },[]);

  const quizCtx=useContext(QuizContext);
  const currentQIdx=quizCtx?quizCtx.currentQuestion:0;

  const pg={home:Home,select:DramaSelect,quiz:Quiz,results:Results,share:ShareCard};
  const Page=pg[page]||Home;

  return(<>
    {/* Header Bar */}
    <div className="agent-header-bar">
      <div className="brand">
        <span className="brand-title"><em>DramaType</em> Agent</span>
        <span className="brand-sub">面向长视频平台的可追溯互动内容生产 Agent</span>
      </div>

      {providerStatus&&<span className={`prov-badge ${providerStatus.has_api_key?'ok':'warn'}`}><span className="prov-dot"/>{providerStatus.provider} {providerStatus.model}</span>}

      <button className="ag-btn" onClick={checkLLM}>Check LLM</button>

      <button className="ag-btn" onClick={()=>setShowGoal(v=>!v)} style={{padding:'7px 10px'}}>
        {showGoal?'收起 ↑':'Goal ↓'}
      </button>

      <button className="ag-btn primary" onClick={runAgent} disabled={running}>
        {running?<><span className="ag-spinner"/>Running...</>:'Run Agent'}
      </button>

      <div className="mode-toggle">
        <button className={mode==='experience'?'active':''} onClick={()=>toggleMode('experience')}>体验模式</button>
        <button className={mode==='agent'?'active':''} onClick={()=>toggleMode('agent')}>Agent 模式</button>
      </div>

      <button className="ag-btn accent" onClick={()=>setDrawerOpen(v=>!v)}>
        {drawerOpen?'关闭面板':'查看 Agent 过程'}
      </button>
    </div>

    {/* Goal textarea (collapsible) */}
    {showGoal&&<div style={{
      background:'rgba(17,17,24,.95)',borderBottom:'1px solid rgba(255,255,255,.06)',
      padding:'10px 20px',display:'flex',gap:10,alignItems:'flex-start',
    }}>
      <textarea value={goalText} onChange={e=>setGoalText(e.target.value)} rows={2} style={{
        flex:1,background:'rgba(255,255,255,.04)',color:'#f0f0f5',
        border:'1px solid rgba(255,255,255,.08)',borderRadius:8,
        padding:'8px 12px',fontSize:12,resize:'vertical',fontFamily:'inherit',lineHeight:1.5,
      }}/>
      <button className="ag-btn primary" onClick={runAgent} disabled={running} style={{flexShrink:0}}>
        {running?<><span className="ag-spinner"/>Running...</>:'Run Agent'}
      </button>
    </div>}

    {/* Page content */}
    <div style={{opacity:trans?0:1,transition:'opacity .2s ease'}}>
      <Page onNavigate={nav}/>
    </div>

    {/* Agent Drawer */}
    <AgentDrawer
      open={drawerOpen}
      onClose={()=>setDrawerOpen(false)}
      agentResult={agentResult}
      providerStatus={providerStatus}
      currentQIndex={currentQIdx}
      testingLLM={testingLLM}
      onTestLLM={testLLM}
    />

    {/* Toast */}
    {toastMsg&&<div className={`ag-toast ${toastMsg.type||''}`}>{toastMsg.msg}</div>}
  </>);
}
</script>

<!-- ==================== ROOT ==================== -->
<script type="text/babel">
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<QuizProvider><App/></QuizProvider>);
</script>
</body>
